<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인사이드와글 - 감정 구슬 팩토리</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f6f5f8;
            color: #2d3436;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        /* 감정 제어판 보드 디자인 */
        .control-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 30px 24px;
            box-shadow: 0 12px 40px rgba(111, 76, 232, 0.08);
            border: 2px solid #ffffff;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
            text-align: center;
        }
        .panel-header {
            margin-bottom: 22px;
        }
        .panel-title {
            font-size: 16px;
            font-weight: 800;
            color: #6c5ce7; /* 와글 시그니처 퍼플 */
            letter-spacing: -0.5px;
            margin: 0 0 4px 0;
        }
        .panel-subtitle {
            font-size: 11px;
            color: #a0a0a0;
            margin: 0;
            font-weight: 500;
        }
        
        /* 영롱한 감정 구슬 오브제 */
        .orb-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 24px auto;
        }
        .emotion-orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* 실제 입체적인 구슬 느낌이 나는 그라데이션 */
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #fff0f5 20%, #e8dbfc 60%, #b8a1ec 100%);
            position: relative;
            box-shadow: 0 8px 24px rgba(154, 110, 240, 0.15), inset -5px -5px 15px rgba(108, 92, 231, 0.2);
        }
        
        /* 구슬 내부의 네온 바늘 */
        .orb-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
            transition: transform 0.2s cubic-bezier(0.1, 1, 0.1, 1);
        }
        .hour-hand {
            width: 5px;
            height: 45px;
            background: #a8a5e6; /* 은은한 라벤더 */
            margin-left: -2.5px;
            z-index: 3;
        }
        .minute-hand {
            width: 3px;
            height: 62px;
            background: #00cec9; /* 슬픔/까칠 네온 민트 */
            margin-left: -1.5px;
            z-index: 2;
            box-shadow: 0 0 8px rgba(0, 206, 201, 0.6);
        }
        .second-hand {
            width: 1.5px;
            height: 72px;
            background: #fdcb6e; /* 기쁨이 네온 옐로우 */
            margin-left: -0.75px;
            z-index: 1;
            box-shadow: 0 0 8px rgba(253, 203, 110, 0.8);
        }
        .orb-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #6c5ce7;
            border: 2px solid #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        
        /* 본부 디지털 디스플레이 */
        .display-box {
            font-size: 24px;
            font-weight: 700;
            color: #2d3436;
            font-family: 'Courier New', Courier, monospace;
            background: rgba(108, 92, 231, 0.06);
            padding: 8px 16px;
            border-radius: 14px;
            display: inline-block;
            margin-bottom: 12px;
            border: 1px solid rgba(108, 92, 231, 0.1);
        }
        
        /* 와글와글 감정 피드 */
        .status-feed {
            font-size: 12px;
            color: #57606f;
            min-height: 18px;
            font-weight: 600;
            background: #ffffff;
            padding: 6px 12px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>

<div class="control-panel">
    <div class="panel-header">
        <div class="panel-title">🔮 INSIDE WAGLE</div>
        <div class="panel-subtitle">우리들의 기억구슬이 구워지는 시간</div>
    </div>
    
    <div class="orb-wrapper">
        <div class="emotion-orb">
            <div id="hour" class="orb-hand hour-hand"></div>
            <div id="minute" class="orb-hand minute-hand"></div>
            <div id="second" class="orb-hand second-hand"></div>
            <div class="orb-center"></div>
        </div>
    </div>
    
    <div class="display-box" id="clockDisplay">00:00:00</div>
    <br>
    <div class="status-feed" id="statusMessage">
        ✨ 감정 컨트롤 본부 가동 중
    </div>
</div>

<script>
    // 멘트도 독서모임 '와글'의 정체성을 듬뿍 담아 따뜻하게 구성!
    const waglemessages = [
        "💛 기쁨이 구슬이 레일을 타고 굴러가는 중!",
        "💙 이번 페이지에선 슬픔이가 제어판을 잡았나 봐요.",
        "💜 소심이가 조심조심 다음 챕터를 넘기는 중..",
        "💚 까칠이가 이 주인공 대사에 태클을 겁니다!",
        "❤️ 버럭이가 책 속 빌런에게 화를 내는 타이밍!",
        "📚 와글 멤버들의 이야기가 장기 기억으로 저장 중!"
    ];

    function runClock() {
        const now = new Date();
        const hrs = now.getHours();
        const mins = now.getMinutes();
        const secs = now.getSeconds();
        
        document.getElementById('clockDisplay').innerText = 
            `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
            
        const hRotation = (hrs % 12) * 30 + mins * 0.5;
        const mRotation = mins * 6;
        const sRotation = secs * 6;
        
        document.getElementById('hour').style.transform = `rotate(${hRotation}deg)`;
        document.getElementById('minute').style.transform = `rotate(${mRotation}deg)`;
        document.getElementById('second').style.transform = `rotate(${sRotation}deg)`;
        
        // 8초마다 와글와글 실시간 감정 상태 업데이트
        if (secs % 8 === 0) {
            const msgBox = document.getElementById('statusMessage');
            msgBox.innerText = waglemessages[Math.floor(Math.random() * waglemessages.length)];
        }
    }
    
    setInterval(runClock, 1000);
    runClock();
</script>

</body>
</html>
